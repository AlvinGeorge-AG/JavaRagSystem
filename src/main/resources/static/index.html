<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVA RAG | Onyx Pro</title>
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020202; color: #f3f4f6; }

        /* Deep Onyx Glossy Effect */
        .glass {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 16px 22px;
            border-radius: 24px;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap; /* Fixes the "No Space" issue */
            word-wrap: break-word;
            position: relative;
        }

        .user-msg {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .ai-msg {
            background: rgba(255, 255, 255, 0.04);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Markdown Styling inside bubbles */
        .ai-msg p { margin-bottom: 12px; }
        .ai-msg strong { color: #60a5fa; font-weight: 800; }
        .ai-msg ul { list-style-type: disc; margin-left: 20px; margin-bottom: 10px; }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
            100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.2); }
        }
        .ai-thinking { animation: neon-pulse 2s infinite; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header class="p-5 glass flex justify-between items-center z-50">
    <div>
        <h1 class="text-xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            JAVARAG <span class="text-[10px] text-gray-500 font-normal tracking-widest ml-1">SYSTEM v2.0</span>
        </h1>
    </div>

    <div class="flex gap-4">
        <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this)">
        <button id="uploadBtn" onclick="document.getElementById('fileInput').click()"
                class="glass text-xs font-bold px-5 py-2.5 rounded-full hover:border-blue-500 transition-all flex items-center gap-2">
            <span id="uploadText">UPLOAD DOC</span>
            <div id="uploadSpinner" class="hidden w-3 h-3 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        </button>
    </div>
</header>

<!-- Chat Scroll Window -->
<main id="chatBox" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 pb-36"></main>

<!-- Footer Input -->
<div class="fixed bottom-0 w-full p-6 bg-gradient-to-t from-black via-black/90 to-transparent">
    <div class="max-w-4xl mx-auto flex items-center gap-3 glass p-2 rounded-3xl">
        <input id="userInput" type="text" placeholder="Type a message..."
               class="flex-1 bg-transparent p-4 outline-none text-gray-200">
        <button onclick="sendMessage()" class="p-4 bg-blue-600 hover:bg-blue-500 rounded-2xl transition-all shadow-lg shadow-blue-900/20">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    const sessionId = Math.random().toString(36).substring(7);
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    async function uploadFile(input) {
        if (!input.files[0]) return;
        const btn = document.getElementById('uploadBtn'), text = document.getElementById('uploadText'), spinner = document.getElementById('uploadSpinner');
        btn.classList.add('opacity-50', 'pointer-events-none');
        text.innerText = "INDEXING...";
        spinner.classList.remove('hidden');

        const formData = new FormData();
        formData.append('file', input.files[0]);

        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const msg = await res.text();
            appendMessage('ai', "SYSTEM: " + msg);
        } catch (e) {
            appendMessage('ai', "SYSTEM ERROR: Failed to reach core.");
        } finally {
            btn.classList.remove('opacity-50', 'pointer-events-none');
            text.innerText = "UPLOAD DOC";
            spinner.classList.add('hidden');
            input.value = '';
        }
    }

    function appendMessage(type, text) {
        const wrapper = document.createElement('div');
        wrapper.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${type === 'user' ? 'user-msg' : 'ai-msg ai-thinking'}`;
        bubble.innerHTML = type === 'user' ? text : ''; // AI text handled by typing effect
        wrapper.appendChild(bubble);
        chatBox.appendChild(wrapper);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        return bubble;
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;
        appendMessage('user', msg);
        userInput.value = '';

        const aiBubble = appendMessage('ai', '');

        try {
            const res = await fetch(`/api/chat/${sessionId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: msg
            });
            const fullAnswer = await res.text();
            aiBubble.classList.remove('ai-thinking');

            // TYPING EFFECT WITH MARKDOWN SUPPORT
            let i = 0;
            let currentText = "";
            function type() {
                if (i < fullAnswer.length) {
                    currentText += fullAnswer.charAt(i);
                    // Use marked.parse to render Markdown properly
                    aiBubble.innerHTML = marked.parse(currentText);
                    i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(type, 5);
                }
            }
            type();

        } catch (e) {
            aiBubble.innerText = "CORE DISCONNECTED: Check backend logs.";
        }
    }
</script>
</body>
</html>
